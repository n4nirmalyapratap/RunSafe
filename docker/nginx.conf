# Resolve the upstream lazily so the container starts even if the API service
# isn't ready yet (avoids `host not found in upstream` on cold compose up).
resolver 127.0.0.11 ipv6=off valid=30s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Sensible defaults for an SPA.
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/xml application/wasm image/svg+xml;
    gzip_min_length 1024;

    # Long cache for hashed Vite assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API + auth callbacks to the api-server container.
    location /api/ {
        set $upstream_api "http://api:8080";
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — every non-asset, non-API path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
