# Production-style local stack:
#   docker compose --env-file .env.docker up --build
#
# Services:
#   db        - PostgreSQL 17 with persistent volume
#   migrate   - One-shot Drizzle schema push (waits for db, exits 0)
#   api       - Express/TS API server (esbuild bundle, port 8080)
#   web       - Vite SPA served by nginx with /api -> api proxy (port 80)

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-runsafe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runsafe}
      POSTGRES_DB: ${POSTGRES_DB:-runsafe}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-runsafe} -d ${POSTGRES_DB:-runsafe}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-runsafe}:${POSTGRES_PASSWORD:-runsafe}@db:5432/${POSTGRES_DB:-runsafe}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-runsafe}:${POSTGRES_PASSWORD:-runsafe}@db:5432/${POSTGRES_DB:-runsafe}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
      # Optional: SendGrid for compliance reminders
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8080"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        BASE_PATH: /
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-8000}:80"

volumes:
  db_data:
