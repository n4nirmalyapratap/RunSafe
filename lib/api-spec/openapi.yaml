                items: { type: string }
              answerIdx: { type: integer }
            required: [q, choices, answerIdx]
        completedByMe: { type: boolean }
        myScore:
          type: ["integer", "null"]
      required:
        - id
        - title
        - category
        - durationMinutes
        - steps
        - quiz
        - completedByMe

    CompleteTrainingLessonBody:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
      required: [score]

    TrainingCompletion:
      type: object
      properties:
        id: { type: integer }
        lessonId: { type: integer }
        memberId: { type: integer }
        score: { type: integer }
        completedAt:
          type: string
          format: date-time
      required: [id, lessonId, memberId, score, completedAt]

    PasswordAttestation:
      type: object
      properties:
        id: { type: integer }
        memberId: { type: integer }
        memberName: { type: string }
