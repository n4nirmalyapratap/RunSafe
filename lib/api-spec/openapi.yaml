          type: array
          items:
            $ref: "#/components/schemas/PhishingResult"
      required: [id, name, templateKey, template, createdAt, results]

    PhishingResult:
      type: object
      properties:
        id: { type: integer }
        memberId: { type: integer }
        memberName: { type: string }
        memberEmail: { type: string }
        token: { type: string }
        link: { type: string }
        clickedAt:
          type: ["string", "null"]
          format: date-time
        reportedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, memberId, memberName, memberEmail, token, link]

    CreatePhishingCampaignBody:
      type: object
      properties:
        name: { type: string }
        templateKey: { type: string }
        recipientMemberIds:
          type: array
          items: { type: integer }
          minItems: 1
      required: [name, templateKey, recipientMemberIds]

    TrainingLessonSummary:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        category: { type: string }
        durationMinutes: { type: integer }
        completedByMe: { type: boolean }
        completionCount: { type: integer }
        totalMembers: { type: integer }
      required:
        - id
        - title
        - category
        - durationMinutes
        - completedByMe
        - completionCount
        - totalMembers

    TrainingLessonDetail:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: ["string", "null"] }
        category: { type: string }
        durationMinutes: { type: integer }
        steps:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              body: { type: string }
