        id:
          type: integer
        title:
          type: string
        category:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, upcoming, overdue, completed]
        daysUntilDue:
          type: integer
      required:
        - id
        - title
        - category
        - dueDate
        - status
        - daysUntilDue

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [task_completed, sop_created, compliance_completed, member_added]
        description:
          type: string
        actorName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - description
        - actorName
        - createdAt

    # ─── SECURITY AUTOPILOT ──────────────────────────────────────
    SecuritySummary:
      type: object
      properties:
        postureScore:
          type: integer
          description: Weighted overall security posture (0-100)
        modules:
          type: object
          properties:
            breach:
              $ref: "#/components/schemas/SecurityModuleScore"
            training:
              $ref: "#/components/schemas/SecurityModuleScore"
            phishing:
              $ref: "#/components/schemas/SecurityModuleScore"
            password:
              $ref: "#/components/schemas/SecurityModuleScore"
            vendors:
              $ref: "#/components/schemas/SecurityModuleScore"
            devices:
              $ref: "#/components/schemas/SecurityModuleScore"
          required: [breach, training, phishing, password, vendors, devices]
        counts:
          type: object
          properties:
            openIncidents: { type: integer }
            totalBreaches: { type: integer }
            membersTrained: { type: integer }
            totalMembers: { type: integer }
            totalVendors: { type: integer }
            totalDevices: { type: integer }
            mfaDevices: { type: integer }
          required:
            - openIncidents
            - totalBreaches
            - membersTrained
            - totalMembers
            - totalVendors
            - totalDevices
            - mfaDevices
      required: [postureScore, modules, counts]

    SecurityModuleScore:
      type: object
      properties:
        score:
          type: integer
          description: 0-100 subscore for this module
        label:
          type: string
        detail:
          type: string
      required: [score, label, detail]

    SecurityBreachCheck:
      type: object
      properties:
        id: { type: integer }
        memberId: { type: integer }
        memberName: { type: string }
        email: { type: string }
        breachCount: { type: integer }
        breaches:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              date: { type: ["string", "null"] }
              dataClasses:
                type: array
                items: { type: string }
            required: [name, dataClasses]
        checkedAt:
          type: string
          format: date-time
      required:
        - id
        - memberId
        - memberName
        - email
        - breachCount
        - breaches
        - checkedAt

    PhishingTemplate:
      type: object
      properties:
        key: { type: string }
        name: { type: string }
        difficulty:
          type: string
          enum: [easy, medium, hard]
        subject: { type: string }
        previewBody: { type: string }
        landingTeach: { type: string }
        redFlags:
          type: array
          items: { type: string }
      required: [key, name, difficulty, subject, previewBody, landingTeach, redFlags]

    PhishingCampaignSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        templateKey: { type: string }
        templateName: { type: string }
        recipientCount: { type: integer }
        clickCount: { type: integer }
        reportCount: { type: integer }
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - templateKey
        - templateName
        - recipientCount
        - clickCount
        - reportCount
        - createdAt

