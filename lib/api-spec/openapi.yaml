        - uniquePerSite
        - mfaEverywhere
        - score
        - attestedAt

    UpsertPasswordAttestationBody:
      type: object
      properties:
        usesManager: { type: boolean }
        length12Plus: { type: boolean }
        uniquePerSite: { type: boolean }
        mfaEverywhere: { type: boolean }
      required: [usesManager, length12Plus, uniquePerSite, mfaEverywhere]

