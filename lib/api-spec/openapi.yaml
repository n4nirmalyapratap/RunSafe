          type: integer
        pendingTasks:
          type: integer
        completedTasksThisMonth:
          type: integer
        overdueTasks:
          type: integer
        overdueComplianceItems:
          type: integer
        upcomingComplianceItems:
          type: integer
        nextDueComplianceItem:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/NextDueComplianceItem"
        teamMemberCount:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        upcomingComplianceDeadlines:
          type: array
          items:
            $ref: "#/components/schemas/UpcomingComplianceDeadline"
          default: []
      required:
        - totalSops
        - totalTaskAssignments
        - pendingTasks
        - completedTasksThisMonth
        - overdueTasks
        - overdueComplianceItems
        - upcomingComplianceItems
        - nextDueComplianceItem
        - teamMemberCount
        - recentActivity

    UpcomingComplianceDeadline:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        dueDate:
          type: string
          format: date
        daysUntilDue:
          type: integer
        status:
          type: string
          enum: [overdue, upcoming]
      required:
        - id
        - title
        - category
        - dueDate
        - daysUntilDue
        - status

    NextDueComplianceItem:
      type: object
