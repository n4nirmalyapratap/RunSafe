openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RunSafe API — SMB Operations & Compliance SaaS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: workspace
    description: Workspace management
  - name: sops
    description: Standard Operating Procedures
  - name: tasks
    description: Task assignments
  - name: compliance
    description: Compliance management
  - name: team
    description: Team member management
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── WORKSPACE ───────────────────────────────────────────────────
  /workspace:
    get:
      operationId: getWorkspace
      tags: [workspace]
      summary: Get current user's workspace
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: No workspace found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createWorkspace
      tags: [workspace]
      summary: Create a new workspace (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    patch:
      operationId: updateWorkspace
      tags: [workspace]
      summary: Update workspace settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceBody"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  # ─── TEAM MEMBERS ────────────────────────────────────────────────
  /team:
    get:
      operationId: getTeamMembers
      tags: [team]
      summary: List team members in the workspace
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: inviteTeamMember
      tags: [team]
      summary: Invite a team member by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteTeamMemberBody"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{memberId}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member's role
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamMemberBody"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Remove a team member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Member removed

  # ─── SOPs ────────────────────────────────────────────────────────
  /sops:
    get:
      operationId: getSops
      tags: [sops]
      summary: List all SOPs in the workspace
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of SOPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sop"
    post:
      operationId: createSop
      tags: [sops]
      summary: Create a new SOP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSopBody"
      responses:
        "201":
          description: Created SOP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sop"

  /sops/{sopId}:
    get:
      operationId: getSop
      tags: [sops]
      summary: Get a single SOP with steps
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SOP with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SopDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSop
      tags: [sops]
      summary: Update a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSopBody"
      responses:
        "200":
          description: Updated SOP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sop"
    delete:
      operationId: deleteSop
      tags: [sops]
      summary: Delete a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: SOP deleted

  /sops/{sopId}/steps:
    post:
      operationId: addSopStep
      tags: [sops]
      summary: Add a step to a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSopStepBody"
      responses:
        "201":
          description: Step created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SopStep"
    put:
      operationId: reorderSopSteps
      tags: [sops]
      summary: Reorder steps in a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderSopStepsBody"
      responses:
        "200":
          description: Steps reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SopStep"

  /sops/{sopId}/steps/{stepId}:
    patch:
      operationId: updateSopStep
      tags: [sops]
      summary: Update a SOP step
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSopStepBody"
      responses:
        "200":
          description: Updated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SopStep"
    delete:
      operationId: deleteSopStep
      tags: [sops]
      summary: Delete a SOP step
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Step deleted

  /sops/{sopId}/assign:
    post:
      operationId: assignSop
      tags: [sops]
      summary: Assign a SOP to a team member as a task
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignSopBody"
      responses:
        "201":
          description: Task assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssignment"

  # ─── TASK ASSIGNMENTS ────────────────────────────────────────────
  /tasks:
    get:
      operationId: getTaskAssignments
      tags: [tasks]
      summary: List task assignments (filtered by status or assignee)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - name: assigneeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of task assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskAssignment"

  /tasks/{taskId}:
    get:
      operationId: getTaskAssignment
      tags: [tasks]
      summary: Get a single task assignment with SOP steps and completion state
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task assignment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssignmentDetail"
    patch:
      operationId: updateTaskAssignment
      tags: [tasks]
      summary: Update a task assignment (status, progress)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskAssignmentBody"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssignment"

  /tasks/{taskId}/steps/{stepId}/complete:
    post:
      operationId: completeTaskStep
      tags: [tasks]
      summary: Mark a step as complete within a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStepCompletion"
    delete:
      operationId: uncompleteTaskStep
      tags: [tasks]
      summary: Unmark a step as complete within a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Step completion removed

  # ─── COMPLIANCE ──────────────────────────────────────────────────
  /compliance/items:
    get:
      operationId: getComplianceItems
      tags: [compliance]
      summary: List compliance items for the workspace
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of compliance items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceItem"
    post:
      operationId: createComplianceItem
      tags: [compliance]
      summary: Create a compliance item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplianceItemBody"
      responses:
        "201":
          description: Created compliance item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceItem"

  /compliance/items/{itemId}:
    patch:
      operationId: updateComplianceItem
      tags: [compliance]
      summary: Update a compliance item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplianceItemBody"
      responses:
        "200":
          description: Updated compliance item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceItem"
    delete:
      operationId: deleteComplianceItem
      tags: [compliance]
      summary: Delete a compliance item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /compliance/items/{itemId}/complete:
    post:
      operationId: completeComplianceItem
      tags: [compliance]
      summary: Mark a compliance item as completed (audit log entry)
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteComplianceItemBody"
      responses:
        "201":
          description: Completion recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceCompletion"

  /compliance/audit-log:
    get:
      operationId: getComplianceAuditLog
      tags: [compliance]
      summary: Get the compliance audit log
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceCompletion"

  # ─── DASHBOARD ───────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    # ─── WORKSPACE ───────────────────────────────────────────────
    Workspace:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        industry:
          type: ["string", "null"]
        state:
          type: ["string", "null"]
        employeeCount:
          type: ["integer", "null"]
        plan:
          type: string
          enum: [starter, growth, pro]
        ownerClerkId:
          type: string
        createdAt:
          type: string
          format: date-time
        userRole:
          type: string
          enum: [owner, member]
          description: Server-resolved role for the authenticated user in this workspace.
      required:
        - id
        - name
        - plan
        - ownerClerkId
        - createdAt
        - userRole

    CreateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        state:
          type: string
        employeeCount:
          type: integer
      required:
        - name

    UpdateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        state:
          type: string
        employeeCount:
          type: integer
        plan:
          type: string
          enum: [starter, growth, pro]

    # ─── TEAM ────────────────────────────────────────────────────
    TeamMember:
      type: object
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        clerkId:
          type: ["string", "null"]
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, employee]
        status:
          type: string
          enum: [active, invited, inactive]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - workspaceId
        - email
        - name
        - role
        - status
        - createdAt

    InviteTeamMemberBody:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [owner, employee]
      required:
        - email
        - name

    UpdateTeamMemberBody:
      type: object
      properties:
        role:
          type: string
          enum: [owner, employee]
        status:
          type: string
          enum: [active, inactive]

    # ─── SOPs ────────────────────────────────────────────────────
    Sop:
      type: object
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        stepCount:
          type: integer
        createdByClerkId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - workspaceId
        - title
        - stepCount
        - createdByClerkId
        - createdAt
        - updatedAt

    SopDetail:
      type: object
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        createdByClerkId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        steps:
          type: array
          items:
            $ref: "#/components/schemas/SopStep"
        assignments:
          type: array
          items:
            $ref: "#/components/schemas/SopAssignment"
      required:
        - id
        - workspaceId
        - title
        - createdByClerkId
        - createdAt
        - updatedAt
        - steps

    SopAssignment:
      type: object
      properties:
        id:
          type: integer
        assigneeName:
          type: string
        assigneeEmail:
          type: string
        status:
          type: string
        dueDate:
          type: ["string", "null"]
          format: date
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - assigneeName
        - assigneeEmail
        - status
        - createdAt

    SopStep:
      type: object
      properties:
        id:
          type: integer
        sopId:
          type: integer
        orderIndex:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sopId
        - orderIndex
        - title
        - createdAt

    CreateSopBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
      required:
        - title

    UpdateSopBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        notes:
          type: string
        category:
          type: string

    CreateSopStepBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        orderIndex:
          type: integer
      required:
        - title

    UpdateSopStepBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        orderIndex:
          type: integer

    ReorderSopStepsBody:
      type: object
      properties:
        stepIds:
          type: array
          items:
            type: integer
      required:
        - stepIds

    AssignSopBody:
      type: object
      properties:
        assigneeId:
          type: integer
        dueDate:
          type: ["string", "null"]
          format: date
        notes:
          type: string
      required:
        - assigneeId

    # ─── TASK ASSIGNMENTS ────────────────────────────────────────
    TaskAssignment:
      type: object
      properties:
        id:
          type: integer
        sopId:
          type: integer
        sopTitle:
          type: string
        workspaceId:
          type: integer
        assigneeId:
          type: integer
        assigneeName:
          type: string
        assigneeEmail:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed]
        dueDate:
          type: ["string", "null"]
          format: date
        completedAt:
          type: ["string", "null"]
          format: date-time
        stepsTotal:
          type: integer
        stepsCompleted:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sopId
        - sopTitle
        - workspaceId
        - assigneeId
        - assigneeName
        - assigneeEmail
        - status
        - stepsTotal
        - stepsCompleted
        - createdAt

    UpdateTaskAssignmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed]
        notes:
          type: string
        dueDate:
          type: string
          format: date

    TaskStepCompletion:
      type: object
      properties:
        id:
          type: integer
        taskAssignmentId:
          type: integer
        sopStepId:
          type: integer
        completedAt:
          type: string
          format: date-time
      required:
        - id
        - taskAssignmentId
        - sopStepId
        - completedAt

    TaskAssignmentDetail:
      type: object
      properties:
        id:
          type: integer
        sopId:
          type: integer
        sopTitle:
          type: string
        sopDescription:
          type: ["string", "null"]
        workspaceId:
          type: integer
        assigneeId:
          type: integer
        assigneeName:
          type: string
        assigneeEmail:
          type: string
        status:
          type: string
          enum: [pending, in_progress, completed]
        dueDate:
          type: ["string", "null"]
          format: date
        completedAt:
          type: ["string", "null"]
          format: date-time
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        steps:
          type: array
          items:
            $ref: "#/components/schemas/SopStep"
        completedStepIds:
          type: array
          items:
            type: integer
      required:
        - id
        - sopId
        - sopTitle
        - workspaceId
        - assigneeId
        - assigneeName
        - assigneeEmail
        - status
        - createdAt
        - steps
        - completedStepIds

    # ─── COMPLIANCE ──────────────────────────────────────────────
    ComplianceItem:
      type: object
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: string
          enum: [employment, health_safety, data_privacy, licensing, other]
        recurrence:
          type: string
          enum: [one_time, monthly, quarterly, annually]
        dueDate:
          type: ["string", "null"]
          format: date
        lastCompletedAt:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [pending, upcoming, overdue, completed]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - workspaceId
        - title
        - category
        - recurrence
        - status
        - createdAt

    CreateComplianceItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [employment, health_safety, data_privacy, licensing, other]
        recurrence:
          type: string
          enum: [one_time, monthly, quarterly, annually]
        dueDate:
          type: string
          format: date
      required:
        - title
        - category
        - recurrence

    UpdateComplianceItemBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [employment, health_safety, data_privacy, licensing, other]
        recurrence:
          type: string
          enum: [one_time, monthly, quarterly, annually]
        dueDate:
          type: string
          format: date

    CompleteComplianceItemBody:
      type: object
      properties:
        notes:
          type: string
        completedAt:
          type: string
          format: date-time

    ComplianceCompletion:
      type: object
      properties:
        id:
          type: integer
        complianceItemId:
          type: integer
        complianceItemTitle:
          type: string
        completedByClerkId:
          type: string
        completedByName:
          type: string
        notes:
          type: ["string", "null"]
        completedAt:
          type: string
          format: date-time
      required:
        - id
        - complianceItemId
        - complianceItemTitle
        - completedByClerkId
        - completedByName
        - completedAt

    # ─── DASHBOARD ───────────────────────────────────────────────
    DashboardSummary:
      type: object
      properties:
        totalSops:
          type: integer
        totalTaskAssignments:
          type: integer
        pendingTasks:
          type: integer
        completedTasksThisMonth:
          type: integer
        overdueTasks:
          type: integer
        overdueComplianceItems:
          type: integer
        upcomingComplianceItems:
          type: integer
        nextDueComplianceItem:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/NextDueComplianceItem"
        teamMemberCount:
          type: integer
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        upcomingComplianceDeadlines:
          type: array
          items:
            $ref: "#/components/schemas/UpcomingComplianceDeadline"
          default: []
      required:
        - totalSops
        - totalTaskAssignments
        - pendingTasks
        - completedTasksThisMonth
        - overdueTasks
        - overdueComplianceItems
        - upcomingComplianceItems
        - nextDueComplianceItem
        - teamMemberCount
        - recentActivity

    UpcomingComplianceDeadline:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        dueDate:
          type: string
          format: date
        daysUntilDue:
          type: integer
        status:
          type: string
          enum: [overdue, upcoming]
      required:
        - id
        - title
        - category
        - dueDate
        - daysUntilDue
        - status

    NextDueComplianceItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        dueDate:
          type: string
          format: date
        status:
          type: string
          enum: [pending, upcoming, overdue, completed]
        daysUntilDue:
          type: integer
      required:
        - id
        - title
        - category
        - dueDate
        - status
        - daysUntilDue

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [task_completed, sop_created, compliance_completed, member_added]
        description:
          type: string
        actorName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - description
        - actorName
        - createdAt
