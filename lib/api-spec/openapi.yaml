openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: RunSafe API — SMB Operations & Compliance SaaS
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: workspace
    description: Workspace management
  - name: sops
    description: Standard Operating Procedures
  - name: tasks
    description: Task assignments
  - name: compliance
    description: Compliance management
  - name: team
    description: Team member management
  - name: dashboard
    description: Dashboard summaries
  - name: security
    description: Cybersecurity Autopilot — phishing simulations, training,
      breach monitoring, password hygiene, incident playbooks, vendor risk,
      device inventory, and overall posture score.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── WORKSPACE ───────────────────────────────────────────────────
  /workspace:
    get:
      operationId: getWorkspace
      tags: [workspace]
      summary: Get current user's workspace
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "404":
          description: No workspace found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createWorkspace
      tags: [workspace]
      summary: Create a new workspace (onboarding)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    patch:
      operationId: updateWorkspace
      tags: [workspace]
      summary: Update workspace settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceBody"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  # ─── TEAM MEMBERS ────────────────────────────────────────────────
  /team:
    get:
      operationId: getTeamMembers
      tags: [team]
      summary: List team members in the workspace
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: inviteTeamMember
      tags: [team]
      summary: Invite a team member by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteTeamMemberBody"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/{memberId}:
    patch:
      operationId: updateTeamMember
      tags: [team]
      summary: Update a team member's role
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamMemberBody"
      responses:
        "200":
          description: Updated team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
    delete:
      operationId: removeTeamMember
      tags: [team]
      summary: Remove a team member
      parameters:
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Member removed

  # ─── SOPs ────────────────────────────────────────────────────────
  /sops:
    get:
      operationId: getSops
      tags: [sops]
      summary: List all SOPs in the workspace
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of SOPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sop"
    post:
      operationId: createSop
      tags: [sops]
      summary: Create a new SOP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSopBody"
      responses:
        "201":
          description: Created SOP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sop"

  /sops/{sopId}:
    get:
      operationId: getSop
      tags: [sops]
      summary: Get a single SOP with steps
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SOP with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SopDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateSop
      tags: [sops]
      summary: Update a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSopBody"
      responses:
        "200":
          description: Updated SOP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sop"
    delete:
      operationId: deleteSop
      tags: [sops]
      summary: Delete a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: SOP deleted

  /sops/{sopId}/steps:
    post:
      operationId: addSopStep
      tags: [sops]
      summary: Add a step to a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSopStepBody"
      responses:
        "201":
          description: Step created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SopStep"
    put:
      operationId: reorderSopSteps
      tags: [sops]
      summary: Reorder steps in a SOP
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderSopStepsBody"
      responses:
        "200":
          description: Steps reordered
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SopStep"

  /sops/{sopId}/steps/{stepId}:
    patch:
      operationId: updateSopStep
      tags: [sops]
      summary: Update a SOP step
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSopStepBody"
      responses:
        "200":
          description: Updated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SopStep"
    delete:
      operationId: deleteSopStep
      tags: [sops]
      summary: Delete a SOP step
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Step deleted

  /sops/{sopId}/assign:
    post:
      operationId: assignSop
      tags: [sops]
      summary: Assign a SOP to a team member as a task
      parameters:
        - name: sopId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignSopBody"
      responses:
        "201":
          description: Task assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssignment"

  # ─── TASK ASSIGNMENTS ────────────────────────────────────────────
  /tasks:
    get:
      operationId: getTaskAssignments
      tags: [tasks]
      summary: List task assignments (filtered by status or assignee)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - name: assigneeId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of task assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskAssignment"

  /tasks/{taskId}:
    get:
      operationId: getTaskAssignment
      tags: [tasks]
      summary: Get a single task assignment with SOP steps and completion state
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task assignment detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssignmentDetail"
    patch:
      operationId: updateTaskAssignment
      tags: [tasks]
      summary: Update a task assignment (status, progress)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskAssignmentBody"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskAssignment"

  /tasks/{taskId}/steps/{stepId}/complete:
    post:
      operationId: completeTaskStep
      tags: [tasks]
      summary: Mark a step as complete within a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Step marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskStepCompletion"
    delete:
      operationId: uncompleteTaskStep
      tags: [tasks]
      summary: Unmark a step as complete within a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
        - name: stepId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Step completion removed

  # ─── COMPLIANCE ──────────────────────────────────────────────────
  /compliance/meta:
    get:
      operationId: getComplianceMeta
      tags: [compliance]
      summary: Supported countries, states, and industries for the compliance catalog
      responses:
        "200":
          description: Catalog metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceMeta"

  /compliance/sync:
    post:
      operationId: syncComplianceFromCatalog
      tags: [compliance]
      summary: Idempotently add catalog items missing for the workspace's country / state / industry
      responses:
        "200":
          description: Number of items added vs. skipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncComplianceResponse"

  /compliance/items:
    get:
      operationId: getComplianceItems
      tags: [compliance]
      summary: List compliance items for the workspace
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of compliance items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceItem"
    post:
      operationId: createComplianceItem
      tags: [compliance]
      summary: Create a compliance item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplianceItemBody"
      responses:
        "201":
          description: Created compliance item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceItem"

  /compliance/items/{itemId}:
    patch:
      operationId: updateComplianceItem
      tags: [compliance]
      summary: Update a compliance item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplianceItemBody"
      responses:
        "200":
          description: Updated compliance item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceItem"
    delete:
      operationId: deleteComplianceItem
      tags: [compliance]
      summary: Delete a compliance item
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /compliance/items/{itemId}/complete:
    post:
      operationId: completeComplianceItem
      tags: [compliance]
      summary: Mark a compliance item as completed (audit log entry)
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteComplianceItemBody"
      responses:
        "201":
          description: Completion recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceCompletion"

  /compliance/audit-log:
    get:
      operationId: getComplianceAuditLog
      tags: [compliance]
      summary: Get the compliance audit log
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ComplianceCompletion"

  # ─── DASHBOARD ───────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ─── SECURITY AUTOPILOT ──────────────────────────────────────────
  /security/summary:
    get:
      operationId: getSecuritySummary
      tags: [security]
      summary: Overall security posture score + module subscores
      responses:
        "200":
          description: Security summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecuritySummary"

  /security/breach-checks:
    get:
      operationId: getSecurityBreachChecks
      tags: [security]
      summary: List the most recent breach scan for every team member
      responses:
        "200":
          description: Breach checks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SecurityBreachCheck"

  /security/breach-checks/{memberId}/refresh:
    post:
      operationId: refreshSecurityBreachCheck
      tags: [security]
      summary: Re-query the public breach API for one member's email
      parameters:
        - in: path
          name: memberId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Latest breach check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecurityBreachCheck"

  /security/phishing/templates:
    get:
      operationId: getPhishingTemplates
      tags: [security]
      summary: List built-in phishing email templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhishingTemplate"

  /security/phishing/campaigns:
    get:
      operationId: getPhishingCampaigns
      tags: [security]
      summary: List phishing simulation campaigns with summary stats
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PhishingCampaignSummary"
    post:
      operationId: createPhishingCampaign
      tags: [security]
      summary: Create a new phishing simulation campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePhishingCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaignDetail"

  /security/phishing/campaigns/{campaignId}:
    get:
      operationId: getPhishingCampaign
      tags: [security]
      summary: Campaign detail with per-recipient tracking links + status
      parameters:
        - in: path
          name: campaignId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhishingCampaignDetail"
    delete:
      operationId: deletePhishingCampaign
      tags: [security]
      summary: Delete a campaign (and its tracking links)
      parameters:
        - in: path
          name: campaignId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /security/training/lessons:
    get:
      operationId: getTrainingLessons
      tags: [security]
      summary: List training lessons (seeds catalog on first call)
      responses:
        "200":
          description: Lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrainingLessonSummary"

  /security/training/lessons/{lessonId}:
    get:
      operationId: getTrainingLesson
      tags: [security]
      summary: Get a lesson's full content (steps + quiz)
      parameters:
        - in: path
          name: lessonId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Lesson
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingLessonDetail"

  /security/training/lessons/{lessonId}/complete:
    post:
      operationId: completeTrainingLesson
      tags: [security]
      summary: Record a quiz completion for the current user
      parameters:
        - in: path
          name: lessonId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTrainingLessonBody"
      responses:
        "200":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingCompletion"

  /security/passwords:
    get:
      operationId: getPasswordAttestations
      tags: [security]
      summary: All team password-hygiene attestations (owner only)
      responses:
        "200":
          description: Attestations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PasswordAttestation"

  /security/passwords/me:
    get:
      operationId: getMyPasswordAttestation
      tags: [security]
      summary: Current user's attestation (or null)
      responses:
        "200":
          description: Attestation or null
          content:
            application/json:
              schema:
                oneOf:
                  - type: "null"
                  - $ref: "#/components/schemas/PasswordAttestation"
    put:
      operationId: upsertMyPasswordAttestation
      tags: [security]
      summary: Submit / update current user's password-hygiene attestation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertPasswordAttestationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordAttestation"

  /security/playbooks:
    get:
      operationId: getPlaybooks
      tags: [security]
      summary: List incident response playbooks (seeds catalog on first call)
      responses:
        "200":
          description: Playbooks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlaybookSummary"

  /security/playbooks/{playbookId}:
    get:
      operationId: getPlaybook
      tags: [security]
      summary: Get a playbook with full steps
      parameters:
        - in: path
          name: playbookId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Playbook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaybookDetail"

  /security/incidents:
    get:
      operationId: getIncidents
      tags: [security]
      summary: List active and resolved incidents
      responses:
        "200":
          description: Incidents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Incident"
    post:
      operationId: createIncident
      tags: [security]
      summary: Open a new incident from a playbook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /security/incidents/{incidentId}:
    patch:
      operationId: updateIncident
      tags: [security]
      summary: Update incident notes, completed steps, or resolve it
      parameters:
        - in: path
          name: incidentId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /security/vendors:
    get:
      operationId: getVendors
      tags: [security]
      summary: List vendor / SaaS risk register
      responses:
        "200":
          description: Vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [security]
      summary: Add a vendor to the register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /security/vendors/{vendorId}:
    patch:
      operationId: updateVendor
      tags: [security]
      parameters:
        - in: path
          name: vendorId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    delete:
      operationId: deleteVendor
      tags: [security]
      parameters:
        - in: path
          name: vendorId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /security/devices:
    get:
      operationId: getDevices
      tags: [security]
      summary: List devices (owners see all, members see own)
      responses:
        "200":
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      operationId: createDevice
      tags: [security]
      summary: Add a device for the current user (or any member if owner)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeviceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

  /security/devices/{deviceId}:
    patch:
      operationId: updateDevice
      tags: [security]
      parameters:
        - in: path
          name: deviceId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeviceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
    delete:
      operationId: deleteDevice
      tags: [security]
      parameters:
        - in: path
          name: deviceId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
