          type: string
          enum: [owner, member]
          description: Server-resolved role for the authenticated user in this workspace.
      required:
        - id
        - name
        - plan
        - ownerClerkId
        - createdAt
        - userRole

    CreateWorkspaceBody:
      type: object
      properties:
        name:
          type: string
        industry:
          type: string
        country:
          type: string
        state:
          type: string
